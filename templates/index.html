<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantukan AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=1.1">
</head>
<body>
    <div class="main-page-header">
        DEVELOPED BY: <span>MELVIN CUTE</span>
    </div>

    <div class="chat-wrapper">
        <header class="chat-header">
            <div class="status-indicator"></div>
            <h1>MURA KAHG SI KINSAH BAH (CHATBOT hshahshsah)</h1>
        </header>
        

        <div id="chat-container" class="chat-body">
            <div class="message-row bot">
                <div class="bubble">
                    Systems online. Aysig kalas2 og oras ha.
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" autocomplete="off" placeholder="Speak, if you must...">
            <button onclick="sendMessage()" id="send-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                </svg>
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
